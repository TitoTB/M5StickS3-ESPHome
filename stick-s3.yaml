substitutions:
  name: stick-s3
  friendly_name: Stick S3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  on_boot:
    - priority: -100
      then:
        - component.resume: stick_display
        - light.turn_on:
            id: backlight
            brightness: 30%
  libraries:
    - Wire
    - SPI
    - m5stack/M5Unified@^0.2.7
    - m5stack/M5GFX@^0.2.16
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    build_flags:
      - -DESP32S3
      - -DBOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue
      - -DCORE_DEBUG_LEVEL=1
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MODE=1

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

# Enable Home Assistant API
api:
  encryption:
    key: "REEMPLAZA_CON_TU_API_ENCRYPTION_KEY"

ota:
  - platform: esphome
    password: "REEMPLAZA_CON_TU_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Stick-S3 Fallback Hotspot"
    password: "REEMPLAZA_CON_TU_FALLBACK_PASSWORD"

logger:
  level: DEBUG
  baud_rate: 0

captive_portal:

web_server:
  port: 80

i2c:
  - id: internal_i2c
    sda: 47
    scl: 48
    scan: true
    frequency: 100kHz

external_components:
  - source:
      type: git
      url: https://github.com/TitoTB/M5StickS3-ESPHome.git
      ref: main
      path: components
    components:
      - m5sticks3_display
      - m5sticks3_power
    # Temporal durante el desarrollo: volver a 1days cuando la base compile estable.
    refresh: 0s

time:
  - platform: homeassistant
    id: ha_time

output:
  - platform: ledc
    pin: GPIO38
    id: lcd_backlight_raw
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Retroiluminacion pantalla"
    output: lcd_backlight_raw
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
  - file: "gfonts://Roboto"
    id: font_large
    size: 34

color:
  - id: color_white
    hex: "FFFFFF"
  - id: color_gray
    hex: "808080"
  - id: color_green
    hex: "40D060"
  - id: color_red
    hex: "D04040"

display:
  - platform: m5sticks3_display
    id: stick_display
    update_interval: 1s
    lambda: |-
      it.fill(esphome::Color(0, 0, 0));

      auto now = id(ha_time).now();
      if (now.is_valid()) {
        it.strftime(120, 16, id(font_small), id(color_gray), TextAlign::CENTER, "%d/%m/%Y", now);
        it.strftime(120, 55, id(font_large), id(color_white), TextAlign::CENTER, "%H:%M", now);
      } else {
        it.print(120, 45, id(font_medium), id(color_white), TextAlign::CENTER, "Sin hora");
      }

      it.print(120, 96, id(font_medium), id(color_green), TextAlign::CENTER, "Hola Home Assistant");

      if (!isnan(id(battery_level).state)) {
        it.printf(120, 126, id(font_medium), id(color_white), TextAlign::CENTER, "Bateria %.0f%%", id(battery_level).state);
      } else {
        it.print(120, 126, id(font_medium), id(color_gray), TextAlign::CENTER, "Bateria --%");
      }

      if (id(api_status).state) {
        it.print(8, 6, id(font_small), id(color_green), TextAlign::TOP_LEFT, "HA");
      } else {
        it.print(8, 6, id(font_small), id(color_red), TextAlign::TOP_LEFT, "HA");
      }

      if (!isnan(id(wifi_signal_db).state)) {
        it.printf(232, 6, id(font_small), id(color_gray), TextAlign::TOP_RIGHT, "%.0f dBm", id(wifi_signal_db).state);
      }

m5sticks3_power:
  id: stick_power
  i2c_id: internal_i2c
  address: 0x6E
  update_interval: 30s
  battery_level:
    id: battery_level
    name: "Bateria"
  battery_voltage:
    name: "Voltaje bateria"
  input_voltage:
    name: "Voltaje entrada USB"
  five_volt_voltage:
    name: "Voltaje rail 5V"
  charging:
    name: "Cargando"
  ext_5v:
    name: "Salida EXT 5V"
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: gpio
    id: key1
    name: "Boton azul"
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    id: key2
    name: "Boton lateral"
    pin:
      number: GPIO12
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: status
    id: api_status
    name: "Estado Home Assistant"

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: "Senal WiFi"
    update_interval: 60s

  - platform: uptime
    name: "Tiempo encendido"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
    ssid:
      name: "SSID"
    mac_address:
      name: "MAC"

button:
  - platform: restart
    name: "Reiniciar"

  - platform: safe_mode
    name: "Reiniciar en modo seguro"

  - platform: template
    name: "Iniciar asistente de voz"
    icon: "mdi:microphone"
    on_press:
      - voice_assistant.start_continuous:

  - platform: template
    name: "Detener asistente de voz"
    icon: "mdi:microphone-off"
    on_press:
      - voice_assistant.stop:

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    use_mclk: true
    use_microphone: true
    mic_gain: 30DB

i2s_audio:
  - id: i2s_bus
    i2s_mclk_pin: GPIO18
    i2s_bclk_pin: GPIO17
    i2s_lrclk_pin: GPIO15

speaker:
  - platform: i2s_audio
    id: internal_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    audio_dac: es8311_dac
    i2s_dout_pin: GPIO16
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    timeout: never

microphone:
  - platform: i2s_audio
    id: internal_microphone
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left

media_player:
  - platform: speaker
    id: stick_media_player
    name: "Reproductor multimedia"
    announcement_pipeline:
      speaker: internal_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    buffer_size: 200000
    volume_initial: 50%
    volume_max: 75%

voice_assistant:
  id: va
  microphone:
    microphone: internal_microphone
    channels: 0
    gain_factor: 2
  media_player: stick_media_player
  noise_suppression_level: 2
  auto_gain: 20dBFS
  volume_multiplier: 1.5
  on_start:
    - logger.log: "Asistente de voz iniciado"
  on_end:
    - logger.log: "Asistente de voz finalizado"
