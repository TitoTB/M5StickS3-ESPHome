substitutions:
  name: stick-s3
  friendly_name: Stick S3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  on_boot:
    - priority: -100
      then:
        - component.resume: stick_display
        - light.turn_on:
            id: backlight
            brightness: 30%
  libraries:
    - Wire
    - SPI
    - m5stack/M5Unified@^0.2.7
    - m5stack/M5GFX@^0.2.16
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    build_flags:
      - -DESP32S3
      - -DBOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue
      - -DCORE_DEBUG_LEVEL=1
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MODE=1

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

external_components:
  - source:
      type: git
      url: https://github.com/TitoTB/M5StickS3-ESPHome.git
      ref: main
      path: components
    components:
      - m5sticks3_display
      - m5sticks3_power
    refresh: 1days

time:
  - platform: homeassistant
    id: ha_time

output:
  - platform: ledc
    pin: GPIO38
    id: lcd_backlight_raw
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Retroiluminacion pantalla"
    output: lcd_backlight_raw
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
  - file: "gfonts://Roboto"
    id: font_large
    size: 34

color:
  - id: color_white
    hex: "FFFFFF"
  - id: color_gray
    hex: "808080"
  - id: color_green
    hex: "40D060"
  - id: color_red
    hex: "D04040"

display:
  - platform: m5sticks3_display
    id: stick_display
    update_interval: 1s
    lambda: |-
      it.fill(esphome::Color(0, 0, 0));

      auto now = id(ha_time).now();
      if (now.is_valid()) {
        it.strftime(120, 16, id(font_small), id(color_gray), TextAlign::CENTER, "%d/%m/%Y", now);
        it.strftime(120, 55, id(font_large), id(color_white), TextAlign::CENTER, "%H:%M", now);
      } else {
        it.print(120, 45, id(font_medium), id(color_white), TextAlign::CENTER, "Sin hora");
      }

      it.print(120, 96, id(font_medium), id(color_green), TextAlign::CENTER, "Hola Home Assistant");

      if (!isnan(id(battery_level).state)) {
        it.printf(120, 126, id(font_medium), id(color_white), TextAlign::CENTER, "Bateria %.0f%%", id(battery_level).state);
      } else {
        it.print(120, 126, id(font_medium), id(color_gray), TextAlign::CENTER, "Bateria --%");
      }

      if (id(api_status).state) {
        it.print(8, 6, id(font_small), id(color_green), TextAlign::TOP_LEFT, "HA");
      } else {
        it.print(8, 6, id(font_small), id(color_red), TextAlign::TOP_LEFT, "HA");
      }

      if (!isnan(id(wifi_signal_db).state)) {
        it.printf(232, 6, id(font_small), id(color_gray), TextAlign::TOP_RIGHT, "%.0f dBm", id(wifi_signal_db).state);
      }

m5sticks3_power:
  id: stick_power
  sda: GPIO47
  scl: GPIO48
  update_interval: 30s
  battery_level:
    id: battery_level
    name: "Bateria"
  battery_voltage:
    name: "Voltaje bateria"
  battery_current:
    name: "Corriente bateria"
  charging:
    name: "Cargando"
  ext_5v:
    name: "Salida EXT 5V"
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: gpio
    id: key1
    name: "Boton azul"
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    id: key2
    name: "Boton lateral"
    pin:
      number: GPIO12
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: status
    id: api_status
    name: "Estado Home Assistant"

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: "Senal WiFi"
    update_interval: 60s

  - platform: uptime
    name: "Tiempo encendido"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
    ssid:
      name: "SSID"
    mac_address:
      name: "MAC"

button:
  - platform: restart
    name: "Reiniciar"

  - platform: safe_mode
    name: "Reiniciar en modo seguro"

remote_transmitter:
  id: ir_tx
  pin: GPIO46
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rx
  pin:
    number: GPIO42
    inverted: true
    mode:
      input: true
  dump: all
